<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studieportal - Hem</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --text-color: #2d3748;
            --primary-color: #e06c75;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --nav-bg: #2d3748;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        /* استایل‌های تم تاریک */
        [data-theme="dark"] {
            --bg-color: #1a202c;
            --text-color: #f7fafc;
            --card-bg: #2d3748;
            --border-color: #4a5568;
            --nav-bg: #1a202c;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0; line-height: 1.6;
            display: flex; flex-direction: column; min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        nav { background-color: var(--nav-bg); box-shadow: var(--shadow-md); color: #ffffff; }
        nav .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 60px; }
        .nav-links { display: flex; height: 100%; align-items: center; }
        nav a { color: #a0aec0; text-decoration: none; font-weight: 600; padding: 0 15px; height: 100%; display: flex; align-items: center; font-size: 0.95rem; }
        nav a:hover, nav a.active { color: #ffffff; }
        nav a.active { border-bottom: 4px solid var(--primary-color); background-color: rgba(255,255,255,0.05); }

        .dark-mode-btn {
            background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 5px;
        }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px 50px 20px; flex: 1; text-align: center; }
        .title { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 5px; font-weight: 700; }
        .subtitle { color: #718096; font-size: 1.1rem; margin-bottom: 30px; }

        .clock-box { background-color: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow-md); margin-bottom: 30px; }
        .card { background-color: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow-md); }
        
        .menu-title { font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; color: var(--text-color); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn { display: inline-block; background-color: var(--primary-color); color: white; text-decoration: none; padding: 14px 30px; border-radius: 10px; font-weight: 700; font-size: 1.1rem; transition: background 0.2s; box-shadow: 0 4px 6px rgba(224, 108, 117, 0.2); }
        .btn:hover { background-color: #be5059; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-links">
                <a href="index.html" class="active">🏠 Hem</a>
                <a href="Begreppslista-v15.html">📖 Begrepp v.15</a>
                <a href="index.html">🎯 Helhetsperspektiv</a>
            </div>
            <button class="dark-mode-btn" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>
    </nav>

    <div class="container">
        <h1 class="title">Begreppslista vecka 15</h1>
        <p class="subtitle">Öva på viktiga begrepp, använd flashcards och gör quiz.</p>

        <div class="clock-box">
            <h2 id="live-date" style="color: #e06c75; margin: 0 0 5px 0; font-size: 1.4rem;">Laddar datum...</h2>
            <h1 id="live-time" style="color: #2d3748; font-size: 3.2rem; margin: 0; font-weight: 800;">00:00:00</h1>
        </div>

        <div class="card">
            <h2 class="menu-title">📚 Studera Nu</h2>
            <p style="color: #718096; margin-bottom: 30px;">Klicka på knappen nedan för att öppna ordlistan och börja plugga.</p>
            <a href="Begreppslista-v15.html" class="btn">Öppna Begreppslista ➡️</a>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const weekdays = ["söndag", "måndag", "tisdag", "onsdag", "torsdag", "fredag", "lördag"];
            const months = ["januari", "februari", "mars", "april", "maj", "juni", "juli", "augusti", "september", "oktober", "november", "december"];
            
            const dayName = weekdays[now.getDay()];
            const day = now.getDate();
            const monthName = months[now.getMonth()];
            const year = now.getFullYear();
            
            const fullDateStr = dayName.charAt(0).toUpperCase() + dayName.slice(1) + " " + day + " " + monthName + " " + year;
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const fullTimeStr = hours + ":" + minutes + ":" + seconds;

            document.getElementById('live-date').innerText = fullDateStr;
            document.getElementById('live-time').innerText = fullTimeStr;
        }

        setInterval(updateClock, 1000);
        updateClock();

        // اسکریپت دارک مود
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
